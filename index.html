<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOIDFALL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
    #canvas-container { position: fixed; inset: 0; }
    #hud { position: fixed; inset: 0; pointer-events: none; }
    #distance {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      font-size: 28px; font-weight: bold; letter-spacing: 6px;
      text-shadow: 0 0 10px #ff6600, 0 0 20px #ff6600;
    }
    #platform-label {
      position: absolute; top: 56px; left: 50%; transform: translateX(-50%);
      font-size: 11px; letter-spacing: 4px; opacity: 0.5;
    }
    #speed-display {
      position: absolute; top: 78px; left: 50%; transform: translateX(-50%);
      font-size: 11px; opacity: 0.35; letter-spacing: 2px;
    }
    #dash-wrap {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      width: 140px; text-align: center;
    }
    #dash-label { font-size: 10px; letter-spacing: 3px; opacity: 0.5; margin-bottom: 6px; }
    #dash-bar-bg { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; }
    #dash-bar-fill { height: 3px; background: linear-gradient(90deg,#ff6600,#ffcc00); border-radius: 2px; width: 100%; }
    #controls-hint {
      position: absolute; bottom: 20px; right: 20px;
      font-size: 10px; opacity: 0.3; text-align: right; line-height: 2;
    }
    #checkpoint-msg {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%);
      font-size: 16px; letter-spacing: 6px; color: #88ccff;
      text-shadow: 0 0 20px #88ccff; opacity: 0; pointer-events: none;
    }
    .screen {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: all; display: none;
    }
    #death-screen .screen-title {
      font-size: 80px; font-weight: bold; letter-spacing: 10px;
      color: #ff2200; text-shadow: 0 0 30px #ff2200, 0 0 80px #ff4400; margin-bottom: 24px;
    }
    #win-screen .screen-title {
      font-size: 64px; font-weight: bold; letter-spacing: 8px;
      color: #ffaa00; text-shadow: 0 0 30px #ffaa00, 0 0 80px #ff6600; margin-bottom: 24px;
    }
    .screen-stats { font-size: 15px; opacity: 0.75; text-align: center; line-height: 2.2; margin-bottom: 36px; }
    .screen-stats .val { color: #ff6600; }
    .btn {
      padding: 12px 44px; font-size: 13px; font-family: 'Courier New', monospace;
      background: transparent; border: 1px solid #ff6600; color: #ff6600;
      cursor: pointer; letter-spacing: 5px; transition: all 0.2s;
    }
    .btn:hover { background: #ff6600; color: #000; box-shadow: 0 0 24px #ff6600; }
    .btn-win { border-color: #ffaa00; color: #ffaa00; }
    .btn-win:hover { background: #ffaa00; color: #000; box-shadow: 0 0 24px #ffaa00; }
    #leaderboard { margin-top: 40px; width: 380px; }
    #leaderboard h3 { font-size: 10px; letter-spacing: 5px; opacity: 0.4; margin-bottom: 14px; text-align: center; }
    .lb-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); opacity: 0.7; }
    .lb-row.is-ghost { color: #4488ff; opacity: 0.9; }
    .lb-row .lb-rank { width: 24px; opacity: 0.4; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="hud">
    <div id="distance">0</div>
    <div id="platform-label">PLATFORMS</div>
    <div id="speed-display">0.0 u/s</div>
    <div id="dash-wrap">
      <div id="dash-label">DASH</div>
      <div id="dash-bar-bg"><div id="dash-bar-fill"></div></div>
    </div>
    <div id="checkpoint-msg">CHECKPOINT</div>
    <div id="controls-hint">
      WASD — move<br>SPACE — jump<br>SHIFT — dash<br>MOUSE — camera<br>R — restart
    </div>
  </div>

  <div id="death-screen" class="screen">
    <div class="screen-title">VOID</div>
    <div class="screen-stats">
      REACHED PLATFORM <span class="val" id="stat-dist">0</span><br>
      PERSONAL BEST <span class="val" id="stat-pb">0</span>
    </div>
    <button class="btn" id="retry-btn">[ RETRY ]</button>
    <div id="leaderboard">
      <h3>TOP RUNS — TODAY'S SEED</h3>
      <div id="lb-entries"></div>
    </div>
  </div>

  <div id="win-screen" class="screen">
    <div class="screen-title">BEACON</div>
    <div class="screen-stats">
      ALL <span class="val" id="win-plat">100</span> PLATFORMS CLEARED<br>
      TIME <span class="val" id="win-time">0:00</span>
    </div>
    <button class="btn btn-win" id="win-btn">[ PLAY AGAIN ]</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
